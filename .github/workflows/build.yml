name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Checkout CommonLibSSE-NG
        uses: actions/checkout@v4
        with:
          repository: CharmedBaryon/CommonLibSSE-NG
          path: CommonLibSSE-NG
          submodules: false

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build Release
        run: cmake --build build --config Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: TM_SkillbooksEnhcancer
          path: build/Release/TM_SkillbooksEnhcancer.dll