name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Clone CommonLibSSE-NG
        run: |
          git clone https://github.com/CharmedBaryon/CommonLibSSE-NG.git CommonLibSSE-NG
          cd CommonLibSSE-NG
          git submodule update --init --recursive

      - name: Configure CMake
        run: |
          cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/CommonLibSSE-NG/vcpkg/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build Release
        run: cmake --build build --config Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: TM_SkillbooksEnhcancer
          path: build/Release/TM_SkillbooksEnhcancer.dll